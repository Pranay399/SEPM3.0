<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Nexus SDLC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#424753",
                        "primary-container": "#1868db",
                        "on-secondary-fixed": "#141b2e",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#6c6c71",

                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f1f1",
                        "on-tertiary-container": "#f0eef4",
                        "on-secondary-container": "#5b6279",
                        "surface-container": "#eeeeee",
                        "on-primary-fixed-variant": "#004397",
                        "on-background": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#dbe2fd",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "tertiary": "#535458",
                        "tertiary-fixed": "#e3e2e7",
                        "surface": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "outline": "#727785",
                        "on-surface": "#1a1c1c",
                        "inverse-primary": "#aec6ff",
                        "secondary-container": "#d8dffa",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-primary-fixed": "#001a43",
                        "surface-container-low": "#f3f3f4",
                        "primary-fixed-dim": "#aec6ff",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-fixed": "#1a1b1f",
                        "secondary": "#575e74",
                        "surface-container-highest": "#e2e2e2",
                        "primary": "#0050b2",
                        "tertiary-fixed-dim": "#c7c6cb",
                        "outline-variant": "#c2c6d6",
                        "secondary-fixed-dim": "#bfc6e0",
                        "on-primary-container": "#ecefff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "margin": "24px",
                        "base": "4px",
                        "gutter": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-md": ["Inter"],
                        "code-sm": ["monospace"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "code-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col font-['Inter']">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-6 h-14 w-full sticky top-0 z-50 bg-white border-b border-slate-200 font-['Inter'] text-sm tracking-tight">
<div class="flex items-center gap-8">
<div class="text-lg font-bold text-slate-900 flex items-center gap-2">
<span class="material-symbols-outlined text-blue-700" data-icon="hub" style="font-variation-settings: 'FILL' 1;">hub</span>
                Nexus
            </div>
<nav class="hidden md:flex items-center gap-6">
<!-- Navigation suppressed for active state as this is a transactional page, rendering inactive styling per JSON -->
<a class="text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200 px-2 py-1 rounded" href="#">Platform</a>
<a class="text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200 px-2 py-1 rounded" href="#">Documentation</a>
<a class="text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200 px-2 py-1 rounded" href="#">Status</a>
</nav>
</div>
<div class="flex items-center gap-4">
<a class="text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200 px-3 py-2 rounded" href="#">Support</a>
<button class="bg-blue-700 text-white hover:bg-blue-800 transition-all duration-200 px-4 py-2 rounded-md font-medium active:scale-[0.98]">Request Demo</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex items-center justify-center p-margin">
<div class="w-full max-w-[420px] bg-surface-container-lowest border border-outline-variant rounded-xl p-xl shadow-sm">
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary-fixed mb-md">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="hub" style="font-variation-settings: 'FILL' 1;">hub</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Sign in to continue to Nexus SDLC.</p>
</div>
<form action="#" class="space-y-md" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email or Username</label>
<input class="w-full h-10 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="name@company.com" required="" type="text"/>
</div>
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot password?</a>
</div>
<input class="w-full h-10 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full h-10 bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center hover:bg-on-primary-fixed-variant transition-colors mt-lg" type="submit">
                    Login
                </button>
</form>
<div class="flex items-center my-lg">
<div class="flex-1 border-t border-outline-variant"></div>
<span class="px-md font-label-md text-label-md text-outline">OR</span>
<div class="flex-1 border-t border-outline-variant"></div>
</div>
<div class="space-y-sm">
<button class="w-full h-10 border border-outline-variant rounded-lg flex items-center justify-center gap-sm font-label-md text-label-md text-on-surface hover:bg-surface-container transition-colors bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
                    Continue with SSO
                </button>
<button class="w-full h-10 border border-outline-variant rounded-lg flex items-center justify-center gap-sm font-label-md text-label-md text-on-surface hover:bg-surface-container transition-colors bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="code">code</span>
                    Continue with GitHub
                </button>
<button class="w-full h-10 border border-outline-variant rounded-lg flex items-center justify-center gap-sm font-label-md text-label-md text-on-surface hover:bg-surface-container transition-colors bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="public">public</span>
                    Continue with Google
                </button>
</div>
<p class="text-center mt-xl font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="font-label-md text-label-md text-primary hover:underline" href="#">Sign up</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 px-6 flex flex-col md:flex-row justify-between items-center gap-4 mt-auto bg-slate-50 border-t border-slate-200 font-['Inter'] text-xs text-slate-500">
<div>
            © 2024 Nexus SDLC Automation. All rights reserved.
        </div>
<div class="flex gap-6">
<a class="text-slate-500 hover:text-slate-900 underline opacity-100 transition-opacity" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:text-slate-900 underline opacity-100 transition-opacity" href="#">Terms of Service</a>
<a class="text-slate-500 hover:text-slate-900 underline opacity-100 transition-opacity" href="#">Security</a>
<a class="text-slate-500 hover:text-slate-900 underline opacity-100 transition-opacity" href="#">Status</a>
</div>
</footer>
</body></html>
